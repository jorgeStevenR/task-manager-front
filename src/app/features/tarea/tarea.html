<div class="container">

  <!-- FORM -->
  <div class="card">
    <h2>Crear Tarea 📝</h2>

    <input [(ngModel)]="titulo" placeholder="Título">

    <textarea [(ngModel)]="descripcion" placeholder="Descripción"></textarea>

    <select [(ngModel)]="prioridad">
      <option value="ALTA">🔴 Alta</option>
      <option value="MEDIA">🟡 Media</option>
      <option value="BAJA">🟢 Baja</option>
    </select>

    <!-- 🔥 INPUT CORRECTO -->
    <input 
      type="datetime-local" 
      [(ngModel)]="fechaVencimiento"
    >

    <input type="number" [(ngModel)]="usuarioCreadorId" placeholder="Usuario ID">
    <input type="number" [(ngModel)]="categoriaId" placeholder="Categoría ID">
    <input type="number" [(ngModel)]="estadoId" placeholder="Estado ID">

    <button (click)="crear()">Crear Tarea</button>
  </div>

  <!-- LISTA -->
  <div class="card">
    <h2>Lista de Tareas 📋</h2>

    <button (click)="cargar()">Actualizar</button>

    <div class="task" *ngFor="let t of lista">
      <div>
        <strong>{{ t.titulo }}</strong>
        <p>{{ t.descripcion }}</p>
        <span>{{ t.prioridad }}</span>
      </div>

      <button (click)="eliminar(t.idTarea)">Eliminar</button>
    </div>

  </div>

</div>
